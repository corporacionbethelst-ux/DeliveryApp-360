services:
  db:
    image: postgis/postgis:16-3.4
    container_name: delivery360_db
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: admin123
      POSTGRES_DB: delivery360
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    networks:
      - delivery_network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U admin -d delivery360"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: delivery360_redis
    ports:
      - "6379:6379"
    networks:
      - delivery_network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: delivery360_api
    command: >
      sh -c "echo 'Esperando a la base de datos...' && 
             while ! nc -z db 5432; do sleep 1; done && 
             echo 'Esperando a Redis...' && 
             while ! nc -z redis 6379; do sleep 1; done && 
             echo 'Iniciando migraciones...' && 
             alembic upgrade head && 
             echo 'Iniciando servidor API...' && 
             uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload"
    volumes:
      - ./backend:/app
      - ./backend/uploads:/app/uploads
    ports:
      - "8000:8000"
    environment:
      # DB
      DATABASE_URL: postgresql://admin:admin123@db:5432/delivery360
      DATABASE_URL_SYNC: postgresql+asyncpg://admin:admin123@db:5432/delivery360
      # Redis
      REDIS_URL: redis://redis:6379
      # Security
      SECRET_KEY: DVb1Bx3McB2IkOCcnLjGJfEcuVzbOYvVDMdbr8kEt1E
      ENVIRONMENT: development
      PROJECT_NAME: Delivery360
      # Frontend URL para enlaces de recuperación
      FRONTEND_URL: http://localhost:3000
      # Email Configuration (Lote 12.1.3)
      EMAILS_ENABLED: "True"
      SMTP_HOST: smtp.gmail.com
      SMTP_PORT: 587
      SMTP_USER: ${SMTP_USER}
      SMTP_PASSWORD: ${SMTP_PASSWORD}
      EMAIL_FROM: noreply@delivery360.com
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - delivery_network

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: delivery360_web
    command: npm run dev
    volumes:
      - ./frontend:/app
      - /app/node_modules
    ports:
      - "3000:3000"
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:8000/api/v1
      NEXT_PUBLIC_MAPS_PROVIDER: leaflet
    depends_on:
      - backend
    networks:
      - delivery_network

networks:
  delivery_network:
    driver: bridge

volumes:
  postgres_data: